<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AQA Organic Mechanisms — Complete Guide</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0b0f18; color: #e2e8f0; font-family: 'Georgia','Times New Roman',serif; }
    ::-webkit-scrollbar { height: 4px; width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;
// ─── Topics ────────────────────────────────────────────────────────────────
const topics = [
  { id:"frs",   label:"Free Radical Sub.",       emoji:"⚡", color:"#facc15", dark:"#1a1000" },
  { id:"ea",    label:"Electrophilic Addition",  emoji:"⚗", color:"#4ade80", dark:"#022c16" },
  { id:"sn2",   label:"SN2 Mechanism",           emoji:"🔄", color:"#60a5fa", dark:"#071526" },
  { id:"sn1",   label:"SN1 Mechanism",           emoji:"💥", color:"#a78bfa", dark:"#13082a" },
  { id:"elim",  label:"Elimination",             emoji:"↗", color:"#fb923c", dark:"#1c0800" },
  { id:"carb",  label:"Carbonyl – Nucl. Add.",   emoji:"🧪", color:"#c084fc", dark:"#150a2a" },
  { id:"benz",  label:"Benzene EAS",             emoji:"⬡", color:"#f87171", dark:"#1c0303" },
  { id:"acyl",  label:"Acyl Chlorides",          emoji:"🔬", color:"#67e8f9", dark:"#031418" },
  { id:"ester", label:"Esters & Hydrolysis",     emoji:"🔗", color:"#a78bfa", dark:"#10082a" },
  { id:"amines",label:"Amines",                  emoji:"💠", color:"#34d399", dark:"#022018" },
];

function hexRgb(h) {
  const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h);
  return r ? `${parseInt(r[1],16)},${parseInt(r[2],16)},${parseInt(r[3],16)}` : "255,255,255";
}

// ─── SVG Primitives ────────────────────────────────────────────────────────
const DEFS = () => (
  <defs>
    {/* orange – heterolytic curly arrow */}
    <marker id="oa" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#fb923c"/>
    </marker>
    {/* yellow – homolytic fishhook */}
    <marker id="ya" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#facc15"/>
    </marker>
    {/* green curly arrow */}
    <marker id="ga" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4ade80"/>
    </marker>
    {/* grey reaction arrow */}
    <marker id="wa" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    {/* blue curly arrow */}
    <marker id="ba" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#60a5fa"/>
    </marker>
  </defs>
);

// Electron-movement arrows
const OA = ({d}) => <path d={d} stroke="#fb923c" fill="none" strokeWidth="2.2" markerEnd="url(#oa)"/>;
const YA = ({d}) => <path d={d} stroke="#facc15" fill="none" strokeWidth="2"   markerEnd="url(#ya)"/>;
const GA = ({d}) => <path d={d} stroke="#4ade80" fill="none" strokeWidth="2.2" markerEnd="url(#ga)"/>;
const BA = ({d}) => <path d={d} stroke="#60a5fa" fill="none" strokeWidth="2.2" markerEnd="url(#ba)"/>;

// Straight reaction arrow
const RA = ({x1,y1,x2,y2,above="",below=""}) => (
  <g>
    <line x1={x1} y1={y1} x2={x2-10} y2={y2} stroke="#64748b" strokeWidth="1.5"/>
    <polygon points={`${x2},${y2} ${x2-10},${y2-4} ${x2-10},${y2+4}`} fill="#64748b"/>
    {above && <text x={(x1+x2)/2} y={y1-8}  fill="#94a3b8" fontSize="9" fontFamily="Georgia,serif" textAnchor="middle" fontStyle="italic">{above}</text>}
    {below && <text x={(x1+x2)/2} y={y2+20} fill="#94a3b8" fontSize="9" fontFamily="Georgia,serif" textAnchor="middle" fontStyle="italic">{below}</text>}
  </g>
);

// Equilibrium arrows (double-headed)
const EA = ({x1,y,x2}) => (
  <g>
    <line x1={x1} y1={y-3} x2={x2-8} y2={y-3} stroke="#64748b" strokeWidth="1.4"/>
    <polygon points={`${x2},${y-3} ${x2-8},${y-6} ${x2-8},${y}`}    fill="#64748b"/>
    <line x1={x2} y1={y+3} x2={x1+8} y2={y+3} stroke="#64748b" strokeWidth="1.4"/>
    <polygon points={`${x1},${y+3} ${x1+8},${y} ${x1+8},${y+6}`}    fill="#64748b"/>
  </g>
);

// Atom label
const T = ({x,y,t,c="#e2e8f0",s=14,b=true}) =>
  <text x={x} y={y} fill={c} fontSize={s} fontFamily="'Courier New',monospace"
        fontWeight={b?"700":"400"} textAnchor="middle" dominantBaseline="middle">{t}</text>;

// Bond
const BD = ({x1,y1,x2,y2,dash=false,n=1}) => {
  const dx=x2-x1, dy=y2-y1, len=Math.sqrt(dx*dx+dy*dy)||1;
  const px=-dy/len*2.8, py=dx/len*2.8;
  return <g opacity={dash?0.5:0.85}>
    <line x1={x1} y1={y1} x2={x2} y2={y2} stroke="#94a3b8" strokeWidth="1.8" strokeDasharray={dash?"5,3":"none"}/>
    {n>=2 && <line x1={x1+px} y1={y1+py} x2={x2+px} y2={y2+py} stroke="#94a3b8" strokeWidth="1.8"/>}
    {n>=3 && <line x1={x1-px} y1={y1-py} x2={x2-px} y2={y2-py} stroke="#94a3b8" strokeWidth="1.8"/>}
  </g>;
};

// Lone pair (two blue dots at angle from atom centre)
const LP = ({x,y,angle=90}) => {
  const r=8, a1=(angle-20)*Math.PI/180, a2=(angle+20)*Math.PI/180;
  return <>
    <circle cx={x+r*Math.cos(a1)} cy={y-r*Math.sin(a1)} r="2.3" fill="#60a5fa"/>
    <circle cx={x+r*Math.cos(a2)} cy={y-r*Math.sin(a2)} r="2.3" fill="#60a5fa"/>
  </>;
};

// Radical dot
const RD = ({x,y}) => <circle cx={x} cy={y} r="3" fill="#facc15"/>;

// Charges / labels
const Ch  = ({x,y,t,c="#fca5a5"}) => <text x={x} y={y} fill={c} fontSize="12" fontFamily="monospace">{t}</text>;
const Dl  = ({x,y,t})              => <text x={x} y={y} fill="#fde68a" fontSize="10" fontFamily="monospace">δ{t}</text>;
const Lbl = ({x,y,t,c="#64748b"}) => <text x={x} y={y} fill={c} fontSize="10" fontFamily="Georgia,serif" fontStyle="italic" textAnchor="middle">{t}</text>;
const HdrLbl = ({x,y,t,c}) => <text x={x} y={y} fill={c} fontSize="11" fontFamily="Georgia,serif" fontWeight="600" textAnchor="middle">{t}</text>;

// SVG wrapper
const MS = ({w=540,h=155,children}) => (
  <svg viewBox={`0 0 ${w} ${h}`} width="100%" style={{maxWidth:w,display:"block",margin:"10px auto",overflow:"visible"}}>
    <DEFS/>{children}
  </svg>
);

// Transition-state / intermediate brackets
const BRK = ({x,y,w,h}) => (
  <g stroke="#64748b" strokeWidth="1.5" fill="none" opacity="0.65">
    <path d={`M${x+5},${y} L${x},${y} L${x},${y+h} L${x+5},${y+h}`}/>
    <path d={`M${x+w-5},${y} L${x+w},${y} L${x+w},${y+h} L${x+w-5},${y+h}`}/>
  </g>
);

// Benzene ring (hexagon at cx,cy with radius r)
const Benzene = ({cx,cy,r=28,c="#94a3b8"}) => {
  const pts = Array.from({length:6},(_,i)=>{
    const a=(i*60-30)*Math.PI/180;
    return `${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`;
  }).join(" ");
  return <>
    <polygon points={pts} fill="none" stroke={c} strokeWidth="1.8"/>
    <circle cx={cx} cy={cy} r={r*0.55} fill="none" stroke={c} strokeWidth="1.8"/>
  </>;
};

// ─── UI Components ─────────────────────────────────────────────────────────
const InfoBox = ({bg,border,children}) => (
  <div style={{background:bg,border:`1px solid ${border}`,borderRadius:8,padding:"10px 14px",marginBottom:14,fontSize:"0.85em",lineHeight:1.6}}>
    {children}
  </div>
);

const ReagBox = ({reagents,conditions,color}) => (
  <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
    {reagents  && <span style={{background:"rgba(255,255,255,0.05)",padding:"3px 10px",borderRadius:6,fontSize:"0.79em",color:"#cbd5e1"}}><b style={{color:"#94a3b8"}}>Reagents: </b>{reagents}</span>}
    {conditions && <span style={{background:"rgba(255,255,255,0.05)",padding:"3px 10px",borderRadius:6,fontSize:"0.79em",color:"#cbd5e1"}}><b style={{color:"#94a3b8"}}>Conditions: </b>{conditions}</span>}
  </div>
);

const Steps = ({items,color}) => (
  <div style={{marginTop:10}}>
    {items.map((s,i)=>(
      <div key={i} style={{display:"flex",gap:10,marginBottom:7,alignItems:"flex-start"}}>
        <span style={{background:`rgba(${hexRgb(color)},0.18)`,color,minWidth:22,height:22,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.75em",fontWeight:700,flexShrink:0}}>{i+1}</span>
        <span style={{color:"#cbd5e1",fontSize:"0.84em",lineHeight:1.6}}>{s}</span>
      </div>
    ))}
  </div>
);

const Note   = ({t})  => <div style={{marginTop:10,padding:"8px 12px",background:"rgba(255,255,255,0.03)",borderRadius:6,color:"#94a3b8",fontSize:"0.8em"}}>💡 {t}</div>;
const OBs    = ({t})  => <div style={{background:"rgba(253,230,138,0.06)",border:"1px solid rgba(253,230,138,0.15)",borderRadius:6,padding:"6px 12px",marginBottom:8,color:"#fde68a",fontSize:"0.8em"}}>👁 <b>Observation:</b> {t}</div>;

const MCard = ({title,type,color,reagents,conditions,diagram,steps,note,obs,extra}) => (
  <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderLeft:`3px solid ${color}`,borderRadius:8,padding:"16px 18px",marginBottom:20}}>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8,flexWrap:"wrap"}}>
      <span style={{fontFamily:"Georgia,serif",fontSize:"1.05em",fontWeight:700,color:"#f1f5f9"}}>{title}</span>
      {type && <span style={{background:`rgba(${hexRgb(color)},0.13)`,color,padding:"2px 10px",borderRadius:20,fontSize:"0.72em",fontWeight:700}}>{type}</span>}
    </div>
    {(reagents||conditions) && <ReagBox reagents={reagents} conditions={conditions} color={color}/>}
    {obs     && <OBs t={obs}/>}
    {diagram}
    {steps   && <Steps items={steps} color={color}/>}
    {note    && <Note t={note}/>}
    {extra}
  </div>
);

const SectionHead = ({t,c}) => (
  <h3 style={{color:c,fontFamily:"Georgia,serif",fontSize:"1.05em",fontWeight:700,marginBottom:12,paddingBottom:6,borderBottom:"1px solid rgba(255,255,255,0.08)"}}>
    {t}
  </h3>
);

// ═══════════════════════════════════════════════════════════════════════════
//  MECHANISM DIAGRAMS
// ═══════════════════════════════════════════════════════════════════════════

// ── FRS ───────────────────────────────────────────────────────────────────

    <T x={143} y={65} t="Cl" c="#4ade80"/>
    {/* homolytic fishhook arrows - one electron each way */}
    <YA d="M 108,58 Q 92,38 74,55"/>
    <YA d="M 117,58 Q 133,38 150,55"/>

    <HdrLbl x={100} y={118} t="Propagation 2" c="#facc15"/>

const FRS_Term = () => (
  <MS w={480} h={105}>
    <HdrLbl x={240} y={15} t="Any two radicals combine — no new chain carriers formed" c="#64748b"/>
    <T x={55}  y={50} t="Cl• + •Cl  →  Cl₂"     c="#94a3b8" s={12}/>
    <T x={55}  y={72} t="CH₃• + •Cl  →  CH₃Cl"  c="#94a3b8" s={12}/>
    <T x={55}  y={94} t="CH₃• + •CH₃  →  C₂H₆"  c="#94a3b8" s={12}/>
    <Lbl x={380} y={50}  t="Cl₂ reformed"/>
    <Lbl x={380} y={72}  t="useful product"/>
    <Lbl x={380} y={94}  t="unwanted side product"/>
  </MS>
);

// ── Electrophilic Addition ────────────────────────────────────────────────
const EA_Br2_Step1 = () => (
  <MS w={520} h={160}>
    {/* alkene C=C */}
    <T x={70}  y={80} t="C" c="#e2e8f0"/>

    <T x={127} y={80} t="C" c="#e2e8f0"/>
    <T x={58}  y={62} t="H₂" c="#64748b" s={11}/>
    <T x={139} y={62} t="H₂" c="#64748b" s={11}/>
    {/* Br-Br */}
    <T x={190} y={80} t="Br" c="#c084fc"/>
    <BD x1={204} y1={80} x2={224} y2={80}/>

    <Dl x={185} y={66} t="δ+"/>

    {/* LP on right Br */}
    <LP x={250} y={80} angle={0}/>

    {/* curly arrow: π bond → Br (near) */}
    <OA d="M 98,70 Q 140,42 182,72"/>
    {/* curly arrow: Br-Br → far Br */}
    <OA d="M 215,72 Q 227,52 245,70"/>
    <RA x1={265} y1={80} x2={300} y2={80}/>

    <BRK x={305} y={52} w={140} h={54}/>

    <BD x1={340} y1={84} x2={360} y2={93}/>

    <Ch x={443} y={68} t="⁺" c="#fca5a5"/>

const EA_Br2_Step2 = () => (
  <MS w={500} h={145}>
    {/* bromonium + Br- */}
    <BRK x={20} y={38} w={145} h={55}/>
    <T x={50}  y={65} t="C" c="#e2e8f0" s={13}/>
    <BD x1={60} y1={60} x2={82} y2={52}/>

    <BD x1={60} y1={70} x2={82} y2={80}/>

    <T x={72}  y={65} t="⁺" c="#fca5a5" s={11}/>
    <Ch x={163} y={50} t="⁺"/>

    <LP x={205} y={65} angle={180}/>

);

const EA_HBr = () => (

    {/* C=C + H-Br */}

// ── SN2 ──────────────────────────────────────────────────────────────────
const SN2_Diag = () => (
  <MS w={590} h={162}>

        obs="Steamy white fumes of HCl. Heat evolved."
        diagram={<Acyl_H2O/>}
        steps={[
          "H₂O lone pair attacks the δ+ acyl carbon (addition step).",
          "C=O π bond breaks temporarily — O⁻ forms on the carbonyl oxygen (tetrahedral intermediate).",
          "The tetrahedral intermediate collapses: C=O reforms, Cl⁻ is expelled as the leaving group (elimination).",
          "An H⁺ is lost from the –OH₂⁺ group → carboxylic acid + HCl."
        ]}
        note="Acyl chlorides react much faster than esters with nucleophiles because Cl⁻ is a better leaving group than RO⁻. This makes acylation reactions highly useful in synthesis."
      />
      <MCard title="Acyl Chloride + NH₃ → Amide" type="Nucleophilic addition–elimination" color={c}
        reagents="RCOCl + excess NH₃" conditions="Room temperature (must use excess NH₃)"
        obs="White fumes/solid of NH₄Cl form. The amide is a white solid."
        diagram={<Acyl_NH3/>}
        steps={[
          "NH₃ lone pair on N attacks the δ+ acyl carbon.",
          "Tetrahedral intermediate forms (C=O breaks, N–C bond forms).",
          "Cl⁻ expelled, C=O re-forms — primary amide (RCONH₂) initially formed with NH₄⁺ and Cl⁻.",
          "Excess NH₃ neutralises the HCl produced (NH₃ + HCl → NH₄Cl), otherwise the acid would destroy the product."
        ]}
        note="With a primary amine (RNH₂), you get a secondary amide (RCONHR). Same mechanism — the N lone pair attacks."
        extra={
          <div style={{marginTop:12,background:"rgba(255,255,255,0.03)",borderRadius:6,padding:"10px 14px",fontSize:"0.8em",color:"#cbd5e1"}}>
            <b style={{color:c}}>Summary of acyl chloride reactions:</b>
            <table style={{width:"100%",borderCollapse:"collapse",marginTop:6,fontSize:"0.85em"}}>
              <thead><tr style={{borderBottom:"1px solid rgba(255,255,255,0.1)"}}>
                {["Nucleophile","Reagent","Product"].map(h=><th key={h} style={{padding:"5px 8px",textAlign:"left",color:c}}>{h}</th>)}
              </tr></thead>
              <tbody>
                {[
                  ["H₂O","Water","Carboxylic acid (RCOOH) + HCl"],
                  ["ROH","Alcohol","Ester (RCOOR') + HCl"],
                  ["NH₃","Excess ammonia","Primary amide (RCONH₂) + NH₄Cl"],
                  ["RNH₂","Primary amine","Secondary amide (RCONHR') + RNH₃Cl"],
                ].map(([a,b,cc])=>(
                  <tr key={a} style={{borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                    <td style={{padding:"5px 8px",fontFamily:"monospace"}}>{a}</td>
                    <td style={{padding:"5px 8px"}}>{b}</td>
                    <td style={{padding:"5px 8px"}}>{cc}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        }
      />
    </>
  ),

  ester: (c) => (
    <>
      <InfoBox bg="rgba(167,139,250,0.06)" border="rgba(167,139,250,0.2)">
        <span style={{color:"#ddd6fe"}}><b>Key idea:</b></span><span style={{color:"#ddd6fe"}}> Esterification is the reverse of hydrolysis — both reactions are reversible. Acid hydrolysis is reversible; base hydrolysis (saponification) is irreversible because carboxylate (RCOO⁻) doesn't react back with the alcohol.</span>
      </InfoBox>
      <SectionHead t="Ester Formation" c={c}/>
      <MCard title="Carboxylic acid + Alcohol → Ester" type="Fischer esterification (reversible)" color={c}
        reagents="Carboxylic acid + alcohol" conditions="Conc H₂SO₄ catalyst, heat, reflux"
        obs="Sweet-smelling ester layer. Equilibrium — yield never 100%."
        diagram={<Ester_Form/>}
        steps={[
          "H⁺ (from H₂SO₄) protonates the carbonyl oxygen → makes C more electrophilic (δ+ increases).",
          "The alcohol OH lone pair attacks the activated carbonyl C (nucleophilic addition).",
          "A tetrahedral intermediate forms with two OH groups.",
          "One OH group is protonated and lost as water (elimination step).",
          "H⁺ leaves from the remaining O — ester product + H₂O."
        ]}
        note="Equilibrium — use excess of one reactant (usually alcohol) or remove water continuously to drive forward. Conc H₂SO₄ is a catalyst AND a drying agent."
      />
      <SectionHead t="Ester Hydrolysis" c={c}/>
      <MCard title="Ester + H₂O/NaOH → acid/alcohol" type="Nucleophilic addition–elimination (hydrolysis)" color={c}
        reagents="(a) Dilute H₂SO₄ or HCl + water,  (b) NaOH (aq)" conditions="Heat, reflux"
        diagram={<Ester_Hydrolysis/>}
        steps={[
          "ACID hydrolysis: H⁺ activates the C=O. Water acts as nucleophile, attacks C. Tetrahedral intermediate collapses, alcohol leaves. Gives carboxylic acid + alcohol. REVERSIBLE.",
          "BASE hydrolysis (saponification): OH⁻ directly attacks the carbonyl C. Tetrahedral intermediate forms. Alcohol departs as leaving group. Product is CARBOXYLATE ion (RCOO⁻) — this cannot reverse with the alcohol (different energetics). IRREVERSIBLE.",
          "Base hydrolysis goes to completion — equilibrium lies fully to the right because RCOO⁻ is a stable anion."
        ]}
        note="Saponification is used in soap-making: fat (glycerol ester) + NaOH → glycerol + sodium salt of fatty acid (soap). The sodium carboxylate salt is the soap."
      />
    </>
  ),

  amines: (c) => (
    <>
      <InfoBox bg="rgba(52,211,153,0.06)" border="rgba(52,211,153,0.2)">
        <span style={{color:"#a7f3d0"}}><b>Key idea:</b></span><span style={{color:"#a7f3d0"}}> Amines are bases AND nucleophiles — both because of the lone pair on N. As bases they accept H⁺. As nucleophiles they attack electrophilic carbons. Aryl amines (like aniline) are weaker bases because the lone pair is delocalised into the benzene ring.</span>
      </InfoBox>
      <SectionHead t="Amines as Bases" c={c}/>
      <MCard title="R-NH₂ + H₂O ⇌ RNH₃⁺ + OH⁻" type="Brønsted-Lowry base" color={c}
        diagram={<Amine_Basic/>}
        steps={[
          "The lone pair on N accepts a proton (H⁺) from water — this is the definition of a Brønsted-Lowry base.",
          "Equilibrium lies to the LEFT (amines are WEAK bases) — only partial protonation.",
          "Alkyl amines (CH₃NH₂) are stronger bases than NH₃ — alkyl groups donate electron density to N, making LP more available.",
          "Aryl amines (PhNH₂, aniline) are weaker bases than NH₃ — LP is delocalised into the aromatic ring, less available."
        ]}
        note="Basicity order: aryl amine < NH₃ < primary alkyl amine < secondary alkyl amine. With HCl: amine + HCl → ammonium salt (R-NH₃⁺Cl⁻). These salts are white solids, soluble in water."
      />
      <SectionHead t="Amines as Nucleophiles" c={c}/>
      <MCard title="R-NH₂ + RX → alkylammonium salt → amine" type="Nucleophilic substitution" color={c}
        reagents="Excess halogenoalkane" conditions="Heat, ethanol solvent"
        diagram={<Amine_NuSub/>}
        steps={[
          "N lone pair attacks the δ+ carbon of the halogenoalkane (SN2 mechanism).",
          "A secondary ammonium salt forms first (R₂NH₂⁺X⁻).",
          "Further NH₃ (or more amine) deprotonates the salt → secondary amine R₂NH.",
          "Problem: the secondary amine can react again (it also has a lone pair!) → tertiary amine, then quaternary ammonium salt.",
          "You get a MIXTURE of products — this is the main disadvantage. Use excess NH₃ to get mostly primary amine."
        ]}
        note="To make a specific amine cleanly, use the Gabriel synthesis or reduce a nitrile/amide instead."
        extra={
          <div style={{marginTop:12,background:"rgba(255,255,255,0.03)",borderRadius:6,padding:"10px 14px",fontSize:"0.8em",color:"#cbd5e1"}}>
            <b style={{color:c}}>Ways to make amines (AQA):</b>
            <div style={{marginTop:6,display:"flex",flexDirection:"column",gap:5}}>
              {[
                ["Nitrile + LiAlH₄","→ primary amine (RCH₂NH₂)","2 step from halogenoalkane"],
                ["Nitrobenzene + Sn/conc HCl then NaOH","→ aniline (aryl amine)","reduction of arene"],
                ["Halogenoalkane + excess NH₃","→ mixture of amines","alkylation (messy)"],
                ["Amide + LiAlH₄","→ amine","reduction of amide"],
              ].map(([a,b,c])=>(
                <div key={a} style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  <span style={{fontFamily:"monospace",color:"#e2e8f0"}}>{a}</span>
                  <span style={{color:"#4ade80"}}>{b}</span>
                  <span style={{color:"#64748b"}}>({c})</span>
                </div>
              ))}
            </div>
          </div>
        }
      />
    </>
  ),
};

// ─── App ───────────────────────────────────────────────────────────────────
function App() {
  const [active, setActive] = useState("frs");
  const topic = topics.find(t => t.id === active);

  return (
    <div style={{minHeight:"100vh",background:"#0b0f18",color:"#e2e8f0",fontFamily:"'Georgia','Times New Roman',serif"}}>
      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#0f172a 0%,#1a0c2e 100%)",borderBottom:"1px solid rgba(255,255,255,0.08)",padding:"22px 24px 18px"}}>
        <div style={{fontSize:"0.72em",color:"#64748b",letterSpacing:"0.15em",textTransform:"uppercase",marginBottom:5}}>AQA A-Level Chemistry</div>
        <h1 style={{margin:0,fontSize:"1.65em",fontWeight:700,color:"#f8fafc",letterSpacing:"-0.01em"}}>Organic Mechanisms — Complete Guide</h1>
        <div style={{color:"#94a3b8",fontSize:"0.83em",marginTop:5}}>Curly arrows · Lone pairs · Intermediates · Reagents & Conditions</div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",overflowX:"auto",borderBottom:"1px solid rgba(255,255,255,0.08)",background:"#0d1117",padding:"0 10px",scrollbarWidth:"none",gap:2}}>
        {topics.map(t=>(
          <button key={t.id} onClick={()=>setActive(t.id)} style={{
            background: active===t.id ? t.dark : "transparent",
            border:"none",
            borderBottom: active===t.id ? `2px solid ${t.color}` : "2px solid transparent",
            color: active===t.id ? t.color : "#64748b",
            padding:"11px 13px",
            cursor:"pointer",
            fontFamily:"inherit",
            fontSize:"0.8em",
            fontWeight: active===t.id ? 700 : 500,
            whiteSpace:"nowrap",
            transition:"all 0.15s",
          }}>
            {t.emoji} {t.label}
          </button>
        ))}
      </div>

      {/* Content */}
      <div style={{maxWidth:880,margin:"0 auto",padding:"26px 18px 70px"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:22}}>
          <div style={{width:4,height:30,background:topic.color,borderRadius:2}}/>
          <h2 style={{margin:0,fontSize:"1.35em",fontWeight:700,color:"#f8fafc"}}>{topic.emoji} {topic.label}</h2>
        </div>
        {content[active]?.(topic.color)}
      </div>

      {/* Legend */}
      <div style={{borderTop:"1px solid rgba(255,255,255,0.07)",padding:"14px 22px",background:"#0d1117",display:"flex",gap:18,flexWrap:"wrap",fontSize:"0.78em"}}>
        <span style={{color:"#94a3b8"}}><span style={{color:"#fb923c",fontWeight:700}}>▶ Orange curly arrow</span> = heterolytic electron movement (pair)</span>
        <span style={{color:"#94a3b8"}}><span style={{color:"#facc15",fontWeight:700}}>▷ Yellow fishhook</span> = homolytic (single electron, radical)</span>
        <span style={{color:"#94a3b8"}}><span style={{color:"#60a5fa",fontWeight:700}}>●● Blue dots</span> = lone pair</span>
        <span style={{color:"#94a3b8"}}><span style={{color:"#fde68a",fontWeight:700}}>δ+/δ−</span> = partial charges (polarisation)</span>
        <span style={{color:"#94a3b8"}}><span style={{color:"#c084fc",fontWeight:700}}>Purple</span> = halogens</span>
        <span style={{color:"#94a3b8"}}><span style={{color:"#f87171",fontWeight:700}}>Red</span> = oxygen</span>
        <span style={{color:"#94a3b8"}}><span style={{color:"#60a5fa",fontWeight:700}}>Blue</span> = nitrogen</span>
      </div>
    </div>

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
